services:
  kafka:
    image: bitnamilegacy/kafka:3.7
    container_name: kafka
    hostname: kafka
    ports:
      - "${KAFKA_PORT}:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      ALLOW_PLAINTEXT_LISTENER: "yes"
    networks:
      - framework-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "${KAFKA_UI_PORT}:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=framework
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    depends_on:
      - kafka
    networks:
      - framework-net

  postgres-airflow:
    image: postgres:16
    container_name: postgres-airflow
    ports:
      - "${AIRFLOW_POSTGRES_PORT}:5432"
    environment:
      POSTGRES_USER: ${AIRFLOW_DB_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_DB_NAME}
    volumes:
      - postgres_airflow_data:/var/lib/postgresql/data
    networks:
      - framework-net

  postgres-analytics:
    image: postgres:16
    container_name: postgres-analytics
    ports:
      - "${ANALYTICS_POSTGRES_PORT}:5432"
    environment:
      POSTGRES_USER: ${ANALYTICS_DB_USER}
      POSTGRES_PASSWORD: ${ANALYTICS_DB_PASSWORD}
      POSTGRES_DB: ${ANALYTICS_DB_NAME}
    volumes:
      - postgres_analytics_data:/var/lib/postgresql/data
    networks:
      - framework-net

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - framework-net

  spark-master:
    image: apache/spark:3.5.0
    container_name: spark-master
    ports:
      - "${SPARK_MASTER_PORT}:7077"
      - "${SPARK_MASTER_UI_PORT}:8080"
    command: ["/opt/spark/sbin/start-master.sh"]
    networks:
      - framework-net

  spark-worker:
    image: apache/spark:3.5.0
    container_name: spark-worker
    depends_on:
      - spark-master
    command: ["/opt/spark/sbin/start-worker.sh", "spark://spark-master:7077"]
    networks:
      - framework-net

  airflow:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: airflow
    ports:
      - "${AIRFLOW_UI_PORT}:8080"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres-airflow:5432/${AIRFLOW_DB_NAME}
      - AIRFLOW__WEBSERVER__SECRET_KEY=framework-secret
      - PYTHONPATH=/opt/airflow/dags:/opt/pipeline-jobs
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - KAFKA_TOPIC=${KAFKA_TOPIC}
      - KAFKA_TOPIC_FUNDAMENTALS=${KAFKA_TOPIC_FUNDAMENTALS}
      - KAFKA_TOPIC_DIVIDENDS=${KAFKA_TOPIC_DIVIDENDS}
      - KAFKA_TOPIC_EARNINGS=${KAFKA_TOPIC_EARNINGS}
      - STOCK_SYMBOLS=${STOCK_SYMBOLS}
      - POSTGRES_HOST=postgres-analytics
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${ANALYTICS_DB_NAME}
      - POSTGRES_USER=${ANALYTICS_DB_USER}
      - POSTGRES_PASSWORD=${ANALYTICS_DB_PASSWORD}
      - S3_ENDPOINT=${S3_ENDPOINT_INTERNAL}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_REGION=${S3_REGION}
      - S3_DATALAKE_BUCKET=${S3_DATALAKE_BUCKET}
    volumes:
      - ./pipelines/dags:/opt/airflow/dags
      - ./pipelines/jobs:/opt/pipeline-jobs
      - airflow_logs:/opt/airflow/logs
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
        --role Admin
        --username ${AIRFLOW_ADMIN_USER}
        --password ${AIRFLOW_ADMIN_PASSWORD}
        --firstname Admin
        --lastname User
        --email admin@example.com || true &&
      airflow scheduler &
      exec airflow webserver"
    depends_on:
      - postgres-airflow
      - postgres-analytics
      - kafka
      - minio
    networks:
      - framework-net

  streamlit:
    build:
      context: ./streamlit
      dockerfile: Dockerfile
    container_name: streamlit
    ports:
      - "${STREAMLIT_PORT}:8501"
    environment:
      - ANALYTICS_DB_HOST=postgres-analytics
      - ANALYTICS_DB_PORT=5432
      - ANALYTICS_DB_NAME=${ANALYTICS_DB_NAME}
      - ANALYTICS_DB_USER=${ANALYTICS_DB_USER}
      - ANALYTICS_DB_PASSWORD=${ANALYTICS_DB_PASSWORD}
    depends_on:
      - postgres-analytics
    networks:
      - framework-net

networks:
  framework-net:
    driver: bridge

volumes:
  postgres_airflow_data:
  postgres_analytics_data:
  minio_data:
  airflow_logs:
