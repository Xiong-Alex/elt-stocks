x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: airflow/Dockerfile
  environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__CORE__LOAD_EXAMPLES=false
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres-airflow:5432/${AIRFLOW_DB_NAME}
    - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_WEBSERVER_SECRET_KEY}
    - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW_FERNET_KEY}
    - PYTHONPATH=/opt/airflow/dags:/opt/pipeline-jobs
    - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
    - KAFKA_TOPIC=${KAFKA_TOPIC}
    - KAFKA_TOPIC_FUNDAMENTALS=${KAFKA_TOPIC_FUNDAMENTALS}
    - KAFKA_TOPIC_DIVIDENDS=${KAFKA_TOPIC_DIVIDENDS}
    - KAFKA_TOPIC_EARNINGS=${KAFKA_TOPIC_EARNINGS}
    - STOCK_SYMBOLS=${STOCK_SYMBOLS}
    - POSTGRES_HOST=postgres-analytics
    - POSTGRES_PORT=5432
    - POSTGRES_DB=${ANALYTICS_DB_NAME}
    - POSTGRES_USER=${ANALYTICS_DB_USER}
    - POSTGRES_PASSWORD=${ANALYTICS_DB_PASSWORD}
    - S3_ENDPOINT=${S3_ENDPOINT_INTERNAL}
    - S3_ACCESS_KEY=${S3_ACCESS_KEY}
    - S3_SECRET_KEY=${S3_SECRET_KEY}
    - S3_REGION=${S3_REGION}
    - S3_DATALAKE_BUCKET=${S3_DATALAKE_BUCKET}
  volumes:
    - ./pipelines/dags:/opt/airflow/dags
    - ./pipelines/jobs:/opt/pipeline-jobs
    - airflow_logs:/opt/airflow/logs
  networks:
    - elt-stocks-net
  restart: unless-stopped

services:
  kafka:
    image: ${KAFKA_IMAGE}
    hostname: kafka
    ports:
      - "${KAFKA_PORT}:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      ALLOW_PLAINTEXT_LISTENER: "yes"
    networks:
      - elt-stocks-net
    healthcheck:
      test: ["CMD-SHELL", "bash -ec ': > /dev/tcp/127.0.0.1/9092'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  kafka-ui:
    image: ${KAFKA_UI_IMAGE}
    ports:
      - "${KAFKA_UI_PORT}:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=streamflow
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    depends_on:
      kafka:
        condition: service_started
    networks:
      - elt-stocks-net
    restart: unless-stopped

  postgres-airflow:
    image: ${POSTGRES_IMAGE}
    ports:
      - "${AIRFLOW_POSTGRES_PORT}:5432"
    environment:
      POSTGRES_USER: ${AIRFLOW_DB_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_DB_NAME}
    volumes:
      - postgres_airflow_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_DB_USER} -d ${AIRFLOW_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - elt-stocks-net
    restart: unless-stopped

  postgres-analytics:
    image: ${POSTGRES_IMAGE}
    ports:
      - "${ANALYTICS_POSTGRES_PORT}:5432"
    environment:
      POSTGRES_USER: ${ANALYTICS_DB_USER}
      POSTGRES_PASSWORD: ${ANALYTICS_DB_PASSWORD}
      POSTGRES_DB: ${ANALYTICS_DB_NAME}
    volumes:
      - postgres_analytics_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ANALYTICS_DB_USER} -d ${ANALYTICS_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - elt-stocks-net
    restart: unless-stopped

  minio:
    image: ${MINIO_IMAGE}
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - elt-stocks-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  spark-master:
    image: ${SPARK_IMAGE}
    ports:
      - "${SPARK_MASTER_PORT}:7077"
      - "${SPARK_MASTER_UI_PORT}:8080"
    command: ["/bin/bash", "-c", "/opt/spark/sbin/start-master.sh && tail -f /opt/spark/logs/*"]
    networks:
      - elt-stocks-net
    restart: unless-stopped

  spark-worker:
    image: ${SPARK_IMAGE}
    depends_on:
      spark-master:
        condition: service_started
    command: ["/bin/bash", "-c", "/opt/spark/sbin/start-worker.sh spark://spark-master:7077 && tail -f /opt/spark/logs/*"]
    networks:
      - elt-stocks-net
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "
      airflow db init &&
      airflow db migrate &&
      (airflow users list | grep -q \"${AIRFLOW_ADMIN_USER}\" ||
      airflow users create --role Admin --username ${AIRFLOW_ADMIN_USER} --password ${AIRFLOW_ADMIN_PASSWORD} --firstname ${AIRFLOW_ADMIN_FIRSTNAME} --lastname ${AIRFLOW_ADMIN_LASTNAME} --email ${AIRFLOW_ADMIN_EMAIL})"
    depends_on:
      postgres-airflow:
        condition: service_healthy
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: airflow webserver
    ports:
      - "${AIRFLOW_UI_PORT}:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres-airflow:
        condition: service_healthy
      postgres-analytics:
        condition: service_healthy
      kafka:
        condition: service_started
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health > /dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  airflow-scheduler:
    <<: *airflow-common
    command: airflow scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres-airflow:
        condition: service_healthy
      postgres-analytics:
        condition: service_healthy
      kafka:
        condition: service_started
      minio:
        condition: service_started

  streamlit:
    build:
      context: ./streamlit
      dockerfile: Dockerfile
    ports:
      - "${STREAMLIT_PORT}:8501"
    environment:
      - ANALYTICS_DB_HOST=postgres-analytics
      - ANALYTICS_DB_PORT=5432
      - ANALYTICS_DB_NAME=${ANALYTICS_DB_NAME}
      - ANALYTICS_DB_USER=${ANALYTICS_DB_USER}
      - ANALYTICS_DB_PASSWORD=${ANALYTICS_DB_PASSWORD}
    depends_on:
      postgres-analytics:
        condition: service_healthy
    networks:
      - elt-stocks-net
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health', timeout=5)\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

networks:
  elt-stocks-net:
    driver: bridge

volumes:
  postgres_airflow_data:
  postgres_analytics_data:
  minio_data:
  airflow_logs:
